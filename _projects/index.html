---
layout: default
title: Projects
permalink: /projects/
---

<h1>Projects</h1>

<div class="projects-grid">
  {% for project in site.projects %}
    <div class="project-card">
      <h2><a href="{{ project.url | relative_url }}">{{ project.title }}</a></h2>
      {% if project.summary %}
        <p>{{ project.summary }}</p>
      {% endif %}
    </div>
  {% endfor %}
</div>
