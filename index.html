---
layout: default
---

{% if site.projects and site.projects.size > 0 %}
  <div class="projects-grid">
    {% for project in site.projects %}
      <div class="project-card">
        <h3><a href="{{ project.url | relative_url }}">{{ project.title }}</a></h3>
        {% if project.summary %}
          <p>{{ project.summary }}</p>
        {% endif %}
      </div>
    {% endfor %}
  </div>
{% endif %}
